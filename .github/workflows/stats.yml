name: Generate GitHub Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"   # 每天 UTC 0 点更新
  workflow_dispatch:      # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v2
        with:
          card: stats
          options: |
            username=${{ github.repository_owner }}
            show_icons=true
            theme=radical
            hide_border=true
            bg_color=0D1117
            title_color=FF4B4B
            icon_color=FF4B4B
            text_color=c9d1d9
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Langs Card
        uses: readme-tools/github-readme-stats-action@v2
        with:
          card: top-langs
          options: |
            username=${{ github.repository_owner }}
            layout=compact
            theme=radical
            hide_border=true
            bg_color=0D1117
            title_color=FF4B4B
            text_color=c9d1d9
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update stats cards [skip ci]"
          git push
